org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m
android.useAndroidX=true

# RN 0.86 New Architecture의 Java Codegen과 Fabric 구현을 AAR에 포함한다.
# C++ autolinking 결과는 build_aars.sh가 데모 앱 native-link 결과에서 추출한다.
newArchEnabled=true
hermesEnabled=true
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
